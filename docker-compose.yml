version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: local
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    volumes:
      - ./app/sql/local.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: always
    ports:
      - 8000:80
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: local
    volumes:
      - ./app/public:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
